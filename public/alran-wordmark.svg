<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Alran Academy wordmark</title>
  <desc id="desc">Navy blue Alran Academy wordmark on a transparent background.</desc>
  <style>
    .top {
      fill: #102655;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 126px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .bottom {
      fill: #102655;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 228px;
      font-weight: 700;
      letter-spacing: -7px;
    }
  </style>
  <text class="top" x="600" y="132" text-anchor="middle">Alran</text>
  <text class="bottom" x="600" y="314" text-anchor="middle">Academy</text>
</svg>
